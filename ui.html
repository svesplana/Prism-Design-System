<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    background: #0F1B2D;
    color: #fff;
    padding: 28px 24px;
    min-height: 340px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .logo {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7B8FA3;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    color: #fff;
  }
  h1 span { color: #00D4AA; }
  .products {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.04em;
  }
  .tag.spark   { background: #E8572A22; color: #F5A623; border: 1px solid #E8572A44; }
  .tag.stream  { background: #2A6BE822; color: #00D4AA; border: 1px solid #2A6BE844; }
  .tag.clarity { background: #7B2FD422; color: #00E5FF; border: 1px solid #7B2FD444; }
  .desc {
    font-size: 13px;
    color: #7B8FA3;
    line-height: 1.6;
  }
  .progress-wrap {
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .progress-wrap.visible { display: flex; }
  .progress-bar-bg {
    width: 100%;
    height: 4px;
    background: #1F2937;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2A6BE8, #00D4AA);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 12px;
    color: #7B8FA3;
  }
  .actions { display: flex; gap: 10px; margin-top: auto; }
  button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #buildBtn { background: #2A6BE8; color: #fff; }
  #cancelBtn { background: #1F2937; color: #9CA3AF; flex: 0 0 auto; padding: 12px 20px; }
  .done-msg {
    display: none;
    font-size: 14px;
    color: #22C55E;
    font-weight: 600;
    text-align: center;
    padding: 8px;
  }
  .done-msg.visible { display: block; }
</style>
</head>
<body>
  <div class="logo">Meridian · Design System Builder</div>
  <h1>Build your <span>design system</span> in Figma</h1>

  <div class="products">
    <span class="tag spark">🔥 SparkRamp</span>
    <span class="tag stream">🌊 StreamOps</span>
    <span class="tag clarity">🔮 ClarityMap</span>
  </div>

  <p class="desc">
    Creates color styles, text styles, and 25+ components across 5 pages.
    Icons via Lucide (MIT). Fonts: Inter (swap to General Sans post-install).
  </p>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">Starting...</div>
  </div>

  <div class="done-msg" id="doneMsg">✅ Design system built successfully!</div>

  <div class="actions">
    <button id="cancelBtn" onclick="cancel()">Cancel</button>
    <button id="buildBtn" onclick="build()">Build Design System →</button>
  </div>

<script>
  let step = 0;
  const steps = 8;

  function build() {
    document.getElementById('buildBtn').disabled = true;
    document.getElementById('progressWrap').classList.add('visible');
    parent.postMessage({ pluginMessage: { type: 'start' } }, '*');
  }

  function cancel() {
    parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
  }

  window.onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'progress') {
      step++;
      document.getElementById('progressFill').style.width = `${Math.round((step/steps)*100)}%`;
      document.getElementById('progressText').textContent = msg.text;
    }
    if (msg.type === 'done') {
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressText').textContent = 'Complete!';
      document.getElementById('doneMsg').classList.add('visible');
    }
    if (msg.type === 'error') {
      document.getElementById('progressText').textContent = '❌ ' + msg.message;
      document.getElementById('buildBtn').disabled = false;
    }
  };
</script>
</body>
</html>
